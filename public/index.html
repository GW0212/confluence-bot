<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Confluence 기반 질의응답 AI 시스템</title>
<link rel="icon" type="image/svg+xml" href="/favicon/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/icon-16.png">
<link rel="shortcut icon" href="/favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon/icon-192.png">
<meta name="theme-color" content="#3a6ff7">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root,[data-theme="light"]{--bg:#f4f6fb;--surface:#fff;--surface2:#f0f2f8;--border:#dde1ee;--accent:#3a6ff7;--accent2:#6b44f8;--gold:#c08a1e;--text:#1a1d2e;--text-muted:#6b7394;--text-dim:#a0a8c0;--success:#1a9e5f;--error:#d93025;--shadow:0 2px 12px rgba(60,80,180,.08);}
[data-theme="dark"]{--bg:#0a0c10;--surface:#171b24;--surface2:#222733;--border:#3a4258;--accent:#5b85ff;--accent2:#8b6bff;--gold:#e0b550;--text:#f0f2f7;--text-muted:#9aa3bd;--text-dim:#62697f;--success:#3dd68c;--error:#ff6b6b;--shadow:0 2px 14px rgba(0,0,0,.55);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .25s,color .25s;}

/* Header */
header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow);}
.hd-left{display:flex;align-items:center;}
.mobile-menu-btn{display:none;width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:16px;color:var(--text);align-items:center;justify-content:center;}
.hd-center{display:flex;align-items:center;justify-content:center;}
.hd-home-btn{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:10px;transition:background .2s;}
.hd-home-btn:hover{background:var(--surface2);}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hd-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.2;text-align:left;}
.hd-sub{font-size:11px;color:var(--text-muted);text-align:left;}
.hd-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.theme-btn{width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.theme-btn:hover{background:var(--border);}
.status-pill{display:flex;align-items:center;gap:6px;padding:4px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text-muted);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
.dot.on{background:var(--success);box-shadow:0 0 6px var(--success);}
.dot.spin{background:var(--gold);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Overlay - 반드시 display:none으로 시작 */
#overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;background:rgba(244,246,251,.95);}
[data-theme="dark"] #overlay{background:rgba(10,12,16,.97);}
[data-theme="dark"] .sidebar{border-right-color:var(--border);}
[data-theme="dark"] header{border-bottom-color:var(--border);}
[data-theme="dark"] .sb-head,[data-theme="dark"] .sb-foot{border-color:var(--border);}
[data-theme="dark"] .bubble{box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 4px 14px rgba(0,0,0,.4);}
[data-theme="dark"] .modal-box{box-shadow:0 24px 64px rgba(0,0,0,.6), 0 0 0 1px var(--border);}
[data-theme="dark"] .card{box-shadow:0 4px 20px rgba(0,0,0,.4), 0 0 0 1px var(--border);}
[data-theme="dark"] .chip{background:var(--surface2);border-color:var(--border);}
[data-theme="dark"] .field input,[data-theme="dark"] textarea,[data-theme="dark"] .sb-search input{background:#0d1117;border-color:var(--border);}
[data-theme="dark"] .pi:hover{background:var(--surface2);}
[data-theme="dark"] .pi.active{background:rgba(91,133,255,.16);}
[data-theme="dark"] .msg.user .bubble{background:linear-gradient(135deg,rgba(91,133,255,.16),rgba(139,107,255,.1));border-color:rgba(91,133,255,.35);}
[data-theme="dark"] .page-ref{background:rgba(91,133,255,.14);border-color:rgba(91,133,255,.4);}
[data-theme="dark"] .status-pill{background:var(--surface2);border-color:var(--border);}
[data-theme="dark"] .theme-btn{background:var(--surface2);border-color:var(--border);}
#overlay.show{display:flex;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ov-text{font-size:14px;color:var(--text-muted);}
.ov-sub{font-size:12px;color:var(--text-dim);margin-top:-6px;max-width:300px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog-wrap{width:240px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s ease;}

/* Setup */
#setup{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:540px;box-shadow:var(--shadow);}
.card h2{font-size:20px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card>p{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.7;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.conn-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s;}
.conn-btn:hover{opacity:.9;}
.conn-btn:disabled{opacity:.35;cursor:not-allowed;}
.err-box{margin-top:12px;padding:10px 14px;background:rgba(217,48,37,.08);border:1px solid rgba(217,48,37,.25);border-radius:8px;font-size:12px;color:var(--error);display:none;}

/* Main */
#main{display:none;flex:1;overflow:hidden;}
.layout{display:flex;height:100%;}

/* Sidebar */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease;}
.sb-head{padding:11px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.7px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.sb-close-btn{display:none;width:24px;height:24px;border:none;background:var(--surface2);border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-muted);align-items:center;justify-content:center;}
.mobile-sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;}
.mobile-sb-backdrop.show{display:block;}
.sb-search{padding:6px 8px;flex-shrink:0;}
.sb-search-wrap{position:relative;display:flex;align-items:center;}
.sb-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 26px 7px 10px;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;font-family:'Noto Sans KR',sans-serif;}
.sb-search input:focus{border-color:var(--accent);}
.sb-search input::placeholder{color:var(--text-dim);}
.sb-search-clear{position:absolute;right:6px;width:18px;height:18px;border:none;background:none;color:var(--text-dim);cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;border-radius:3px;padding:0;}
.sb-search-clear:hover{color:var(--text);}
.sb-search-clear.visible{display:flex;}
.page-list{flex:1;overflow-y:auto;padding:4px;}
.page-list::-webkit-scrollbar{width:3px;}
.page-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pi{display:flex;align-items:center;border-radius:6px;cursor:pointer;transition:background .15s;user-select:none;}
.pi:hover{background:var(--surface2);}
.pi.active{background:rgba(58,111,247,.12);}
.pi-toggle{width:18px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-dim);transition:transform .2s;}
.pi-toggle.open{transform:rotate(90deg);}
.pi-icon{font-size:12px;flex-shrink:0;margin-right:4px;}
.pi-label{flex:1;font-size:12px;color:var(--text-muted);padding:5px 4px 5px 0;line-height:1.3;word-break:keep-all;}
.pi.active .pi-label{color:var(--accent);font-weight:500;}
.pi:hover .pi-label{color:var(--text);}
.pi-children{display:none;}
.pi-children.open{display:block;}
#search-results{display:none;flex-direction:column;flex:1;overflow:hidden;}
#search-results.active{display:flex;}
.sr-count{padding:4px 10px;font-size:11px;color:var(--text-dim);flex-shrink:0;}
.sr-list{flex:1;overflow-y:auto;padding:4px;}
.sr-list::-webkit-scrollbar{width:3px;}
.sr-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sr-item{padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s;}
.sr-item:hover{background:var(--surface2);}
.sr-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;}
.sr-snippet{font-size:11px;color:var(--text-muted);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.sr-snippet mark,.sr-title mark{background:rgba(58,111,247,.2);color:var(--accent);border-radius:2px;padding:0 1px;}
.sr-empty{padding:20px;text-align:center;font-size:12px;color:var(--text-dim);}
.sb-foot{padding:9px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);line-height:1.5;flex-shrink:0;}

/* Chat */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.msgs{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.welcome{text-align:center;padding:40px 20px;color:var(--text-muted);}
.welcome h3{font-size:17px;color:var(--text);margin-bottom:8px;}
.welcome p{font-size:13px;line-height:1.7;margin-bottom:20px;}
.chips{display:flex;flex-direction:column;gap:6px;align-items:center;}
.chip{padding:6px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
.chip:hover{background:rgba(58,111,247,.1);border-color:var(--accent);color:var(--accent);}
.chip-hint{font-size:12px;color:var(--text-dim);cursor:default;font-family:'JetBrains Mono',monospace;}
.msg{display:flex;gap:9px;align-items:flex-start;min-width:0;}
.msg.user{flex-direction:row-reverse;}
.avatar{width:29px;height:29px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.msg.ai .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.msg.user .avatar{background:var(--surface2);border:1px solid var(--border);}
.bubble{max-width:90%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px 12px 20px;font-size:14px;line-height:1.75;box-shadow:var(--shadow);word-break:break-word;white-space:pre-wrap;}
.msg.user .bubble{background:linear-gradient(135deg,rgba(58,111,247,.1),rgba(107,68,248,.06));border-color:rgba(58,111,247,.22);max-width:90%;}
.bubble p{margin-bottom:0;line-height:1.65;}.bubble p:last-child{margin-bottom:0;}
.bubble ul,.bubble ol{padding-left:0;margin:0;list-style:none;}
.bubble li.li-main{margin:0;padding-left:16px;position:relative;line-height:1.5;}.bubble li.li-main::before{content:'•';position:absolute;left:4px;top:0;line-height:1.5;color:var(--text-muted);}
.bubble li.li-sub{padding-left:28px;margin:0;}.bubble li.li-sub::before{content:'–';left:14px;font-size:12px;color:var(--text-dim);}
.bubble li.li-main + li.li-main{margin-top:10px;}
.bubble li.li-sub + li.li-main{margin-top:10px;}
.bubble li.li-main:first-child{margin-top:0;}
.bubble li p{margin:0!important;padding:0!important;display:inline!important;}
.bubble strong{color:var(--accent);font-weight:600;}
.bubble code{font-family:'JetBrains Mono',monospace;background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--gold);}
.bubble h3,.bubble h4{margin:10px 0 5px;font-weight:600;}
.bubble h3:first-child,.bubble h4:first-child{margin-top:0;}
.page-ref{display:inline-flex;align-items:center;gap:3px;color:var(--accent);background:rgba(58,111,247,.08);border:1px solid rgba(58,111,247,.25);border-radius:6px;padding:1px 8px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .15s;}
.page-ref:hover{background:rgba(58,111,247,.18);}
.page-ref-na{display:inline-flex;align-items:center;gap:3px;color:var(--text-muted);font-size:12px;}
.typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text-muted);animation:bob 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bob{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Input */
.input-wrap{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;min-height:42px;max-height:110px;line-height:1.5;transition:border-color .2s;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text-dim);}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s;}
.send-btn:hover{opacity:.9;}
.send-btn.stop{background:linear-gradient(135deg,#e53935,#c62828);}
.hint{font-size:11px;color:var(--text-dim);margin-top:6px;}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal-backdrop.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:1200px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:modal-in .2s ease;}
@keyframes modal-in{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:10px;flex-shrink:0;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;text-align:center;}
.modal-close{width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;cursor:pointer;font-size:15px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:background .15s;order:-1;}
.modal-close:hover{background:var(--error);color:#fff;}
.modal-goto{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);text-decoration:none;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.modal-goto:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-body{flex:1;overflow-y:auto;padding:24px 28px;font-size:14px;line-height:1.85;color:var(--text);}
.modal-body::-webkit-scrollbar{width:5px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.modal-body h1{font-size:22px;font-weight:700;margin:20px 0 10px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.modal-body h2{font-size:18px;font-weight:700;margin:16px 0 8px;}
.modal-body h3{font-size:15px;font-weight:600;margin:14px 0 6px;}
.modal-body h4,.modal-body h5{font-size:13px;font-weight:600;margin:10px 0 4px;}
.modal-body p{margin-bottom:6px;color:var(--text);}
.modal-body p:empty{display:none;}
/* li 내부 여백 완전 제거 - Confluence의 p 감싸기 패턴 대응 */
.modal-body ul, .modal-body ol { padding-left:22px; margin:0; }
.modal-body li > p,
.modal-body li > div:not(ul):not(ol),
.modal-body li > span,
.modal-body li > strong,
.modal-body li > em,
.modal-body li > a,
.modal-body li > code {
  display:inline!important;margin:0!important;padding:0!important;
}
.modal-body li > p:empty, .modal-body li > div:empty { display:none!important; }
.modal-body li {
  margin:0!important;padding:0!important;
  color:var(--text);line-height:1.65;
}
/* 중첩 ul/ol은 반드시 block */
.modal-body li > ul, .modal-body li > ol {
  margin:1px 0 0 0!important;padding-left:18px;display:block;
}
.modal-body table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px;table-layout:auto;}
.modal-body th{background:var(--surface2);padding:8px 12px;border:1px solid var(--border);font-weight:600;text-align:left;white-space:nowrap;color:var(--text);vertical-align:middle;}
.modal-body td{padding:7px 12px;border:1px solid var(--border);color:var(--text);text-align:left;vertical-align:top;word-break:keep-all;line-height:1.6;}
.modal-body td ul,.modal-body td ol{margin:0!important;padding-left:16px;}
.modal-body td li{margin:0!important;padding:0!important;}
.modal-body td p{margin:0!important;padding:0!important;}
.modal-body tr:nth-child(even) td{background:rgba(0,0,0,.02);}
.modal-body tr:hover td{background:rgba(58,111,247,.05);}
.modal-body strong,.modal-body b{font-weight:600;color:var(--text);}
.modal-body code{font-family:'JetBrains Mono',monospace;background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--gold);}
.modal-body pre{background:var(--surface2);padding:14px;border-radius:8px;font-size:12px;overflow-x:auto;margin-bottom:12px;border:1px solid var(--border);}
.modal-body a{color:var(--accent);text-decoration:none;cursor:pointer;}
.modal-body a:hover{text-decoration:underline;}
.modal-body img{max-width:100%;height:auto;border-radius:8px;margin:10px 0;display:block;border:1px solid var(--border);cursor:zoom-in;}
.modal-body hr{border:none;border-top:2px solid var(--border);margin:16px 0;}
.modal-body blockquote{border-left:4px solid var(--accent);padding:8px 14px;color:var(--text-muted);margin:10px 0;background:var(--surface2);border-radius:0 6px 6px 0;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.pp-ask-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.pp-ask-btn:hover{opacity:.9;}

/* Image Viewer */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.img-viewer.open{display:flex;}
.img-viewer img{max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain;}

/* ── Mobile Responsive (≤768px) ── */
@media (max-width: 768px) {
  /* 헤더 */
  .mobile-menu-btn{display:flex;}
  header{grid-template-columns:auto 1fr auto;padding:10px 12px;gap:8px;}

<script>
// ── 상수 ──
var API = '';
var CACHE_KEY = 'confluence_cache_v8';
var CREDS_KEY = 'confluence_creds';
var CACHE_TTL = 24 * 60 * 60 * 1000;
// 서버로 보내는 요청 본문 최대 크기 (Vercel/Lambda 실질 한도 ~4.5MB 대비 안전 마진)
var MAX_CONTEXT_BYTES = 500000; // 500KB - 서버 응답 속도(Vercel 30~60초 한도) 우선, 서버에서 다시 정밀 필터링함

// ── 상태 ──
var ctx = ''; // 호환용 (더이상 직접 사용하지 않음, buildSafeContext가 매번 새로 생성)
// AI 아바타 아이콘 - 헤더 로고/파비콘과 동일한 디자인으로 통일
var AI_AVATAR_SVG = '<svg viewBox="0 0 64 64" width="16" height="16"><path d="M16 21 a6 6 0 0 1 6 -6 h20 a6 6 0 0 1 6 6 v14 a6 6 0 0 1 -6 6 h-15 l-7 7 v-7 h-2 a6 6 0 0 1 -6 -6 z" fill="white"/><rect x="22" y="18" width="20" height="3.4" rx="1.7" fill="#4f6fd6"/><rect x="22" y="25" width="24" height="3.4" rx="1.7" fill="#4f6fd6"/><rect x="22" y="32" width="15" height="3.4" rx="1.7" fill="#4f6fd6"/></svg>';
var busy = false;
var abortCtrl = null;
var pageStore = {};
var creds = {};
var allLoadedPages = [];
var pageTreeMap = {}; // id → {id, title, children:[id...]} 트리 구조 (모달에서 실제 하위 페이지 표시용
var searchIndex = [];
var searchTimer = null;

// ── UTF-8 바이트 길이 계산 (한국어 등 멀티바이트 정확히 측정) ──
function utf8ByteLength(str) {
  // Blob 사용이 가장 정확하고 빠름
  return new Blob([str]).size;
}

/**
 * 질문에 맞는 관련 페이지만 골라서, 절대 MAX_CONTEXT_BYTES를 넘지 않는
 * 안전한 컨텍스트 문자열을 만들어 반환한다.
 * - 1단계: 키워드 매칭으로 관련 페이지 후보를 점수순으로 정렬
 * - 2단계: 점수 높은 페이지부터 하나씩 추가하면서 실제 UTF-8 바이트 크기를 측정
 * - 3단계: 한도에 도달하면 그 페이지는 건너뛰고 다음(더 짧을 수 있는) 페이지 시도
 */
function buildSafeContext(question) {
  var qLower = (question || '').toLowerCase();
  var qKeywords = qLower.split(/[\s,./()[\]"'?!]+/).filter(function(w){ return w.length >= 2; });

  var synonyms = {
    '전투': ['전투','스킬','경직','공격','방어','밸런스'],
    '캐릭터': ['캐릭터','직업','속도','능력치'],
    '콘텐츠': ['콘텐츠','던전','필드','레이드','보스'],
    '아이템': ['아이템','장비','소환','소환사'],
    '경직': ['경직','스턴','블렌딩','피격'],
  };
  var expanded = qKeywords.slice();
  Object.keys(synonyms).forEach(function(key) {
    if (qLower.indexOf(key) >= 0) expanded = expanded.concat(synonyms[key]);
  });
  expanded = expanded.filter(function(v,i,a){ return a.indexOf(v)===i; });

  // 질문 정제(조사/어미 제거) - 제목 완전일치 탐지용
  var stop = ['시스템','기획','내용','설명해','알려줘','줘','이','가','는','을','를','에','뭐야','뭔가요','란','이란','관련','해줘'];
  var qClean = question || '';
  stop.forEach(function(w){ qClean = qClean.split(w).join(' '); });
  qClean = qClean.replace(/[?!？！.,]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();

  // ── 버전/식별자 정규화 매칭: "M57.0" ~ "M57", "Q7" ~ "Q7.1" 등 마이너 버전 차이 무시 ──
  function extractVersionTokens(text) {
    var out = []; var re = /[Mm](\d+)(?:\.\d+)?/g; var m;
    while ((m = re.exec(text)) !== null) out.push('m' + m[1]);
    return out.filter(function(v,i,a){ return a.indexOf(v)===i; });
  }
  function normalizeIdentifier(token) { return token.replace(/(\.\d+)+$/g, ''); }
  function tokenizeIdentifiers(text) {
    var m = text.match(/[A-Za-z]+\d+(?:\.\d+)*/g) || [];
    return m.map(function(t){ return t.toLowerCase(); });
  }
  var qVersionTokens = extractVersionTokens(question || '');
  var qIdentifiers = tokenizeIdentifiers(question || '').map(normalizeIdentifier);

  // 후보 페이지 점수 계산
  var candidates = [];
  var ids = Object.keys(pageStore);
  for (var i = 0; i < ids.length; i++) {
    var id = ids[i];
    var pg = pageStore[id];
    if (!pg || !pg.content) continue;
    var tl = pg.title.toLowerCase();
    var cl = pg.content.toLowerCase(); // 정확도 우선: 본문 전체를 검사 (일부만 보면 후반부 언급을 놓침)
    var score = 0;
    var isExact = (tl.trim() === qClean) || (qClean.length>0 && qClean.indexOf(tl.trim())>=0 && tl.trim().length>=2);
    if (isExact) score += 1000;
    for (var k = 0; k < expanded.length; k++) {
      var kw = expanded[k];
      if (!kw) continue;
      if (tl === kw) score += 50;
      else if (tl.indexOf(kw) >= 0) score += 10;
      var occ = cl.split(kw).length - 1;
      if (occ > 0) score += Math.min(occ, 6);
    }
    // 버전 토큰 매칭 (M57.0 질문 → M57 페이지도 강하게 매칭)
    if (qVersionTokens.length > 0) {
      var titleVersionTokens = extractVersionTokens(pg.title);
      for (var vi = 0; vi < titleVersionTokens.length; vi++) {
        if (qVersionTokens.indexOf(titleVersionTokens[vi]) >= 0) { score += 800; break; }
      }
    }
    // 범용 식별자 매칭 (영문+숫자 조합의 마이너 버전 차이 무시)
    if (qIdentifiers.length > 0) {
      var titleIds = tokenizeIdentifiers(pg.title).map(normalizeIdentifier);
      for (var ii = 0; ii < titleIds.length; ii++) {
        if (qIdentifiers.indexOf(titleIds[ii]) >= 0) { score += 400; break; }
      }
    }
    if (score > 0) candidates.push({ id: id, title: pg.title, content: pg.content, score: score });
  }

  // 매칭 결과가 너무 적으면 전체 페이지 중 앞부분으로 보강 (질문이 너무 일반적인 경우 대비)
  if (candidates.length < 5) {
    for (var j = 0; j < ids.length && candidates.length < 20; j++) {
      var pg2 = pageStore[ids[j]];
      if (pg2 && pg2.content && !candidates.find(function(c){return c.id===ids[j];})) {
        candidates.push({ id: ids[j], title: pg2.title, content: pg2.content, score: 1 });
      }
    }
  }

  // 버전/식별자가 일치하는 페이지는 절대 누락되지 않도록 최우선 그룹으로 분리
  var versionMatched = candidates.filter(function(c){ return c.score >= 400; });
  var others = candidates.filter(function(c){ return c.score < 400; });
  versionMatched.sort(function(a,b){ return b.score - a.score; });
  others.sort(function(a,b){ return b.score - a.score; });
  candidates = versionMatched.concat(others);

  // 바이트 한도 안에서 최대한 많은 페이지를 담기
  var parts = [];
  var usedBytes = 0;
  var perPageCap = 6000; // 페이지 1개가 통째로 한도를 다 차지하지 않도록 개별 상한 (처리 속도 고려해 축소)
  for (var p = 0; p < candidates.length; p++) {
    var c = candidates[p];
    var body = c.content.length > perPageCap ? c.content.substring(0, perPageCap) : c.content;
    var piece = '=== [' + c.title + '] ===' + (c.lastModified ? ' (실제수정일:' + c.lastModified.substring(0,10) + ')' : '') + '\n' + body + '\n\n';
    var pieceBytes = utf8ByteLength(piece);
    if (usedBytes + pieceBytes > MAX_CONTEXT_BYTES) {
      // 이 페이지를 통째로 못 넣으면, 잘라서라도 일부 포함 시도 (단, 최소 500자 이상 의미있을 때만)
      var remain = MAX_CONTEXT_BYTES - usedBytes;
      if (remain > 800) {
        // 바이트 기준으로 안전하게 자르기 위해 글자 단위로 줄여가며 측정
        var approxChars = Math.floor(remain / 4) - 30; // 헤더 여유분 제외, 보수적으로 4바이트/글자 가정
        if (approxChars > 200) {
          var trimmedBody = body.substring(0, approxChars);
          var trimmedPiece = '=== [' + c.title + '] ===\n' + trimmedBody + '\n\n';
          var trimmedBytes = utf8ByteLength(trimmedPiece);
          if (usedBytes + trimmedBytes <= MAX_CONTEXT_BYTES) {
            parts.push(trimmedPiece);
            usedBytes += trimmedBytes;
          }
        }
      }
      break; // 한도 도달, 더 이상 추가하지 않음
    }
    parts.push(piece);
    usedBytes += pieceBytes;
  }

  var result = parts.join('');
  return { text: result, bytes: usedBytes, pageCount: parts.length, totalCandidates: candidates.length };
}

// ── IndexedDB 캐시 (localStorage 5MB 한도 우회, 페이지당 6000자 저장 가능) ──
var DB_NAME = 'confluence_bot_db';
var DB_STORE = 'cache';
var DB_VERSION = 1;
var _db = null;

function openDB() {
  return new Promise(function(resolve, reject) {
    if (_db) { resolve(_db); return; }
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      e.target.result.createObjectStore(DB_STORE);
    };
    req.onsuccess = function(e) { _db = e.target.result; resolve(_db); };
    req.onerror = function() { reject(req.error); };
  });
}

function saveCache(space, base, pages, loaded) {
  var PER_PAGE = 6000; // IndexedDB는 용량 제한 없어서 충분히 저장
  var slim = loaded.map(function(p) {
    return { id: p.id, title: p.title, depth: p.depth, hasChildren: p.hasChildren,
             content: (p.content || '').substring(0, PER_PAGE),
             pageUrl: p.pageUrl || '', lastModified: p.lastModified || null };
  });
  var data = { space: space, base: base, savedAt: Date.now(), pages: pages, loaded: slim };
  openDB().then(function(db) {
    var tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(data, CACHE_KEY);
    console.log('IndexedDB 캐시 저장: 페이지', slim.length, '개, 페이지당', PER_PAGE, '자');
  }).catch(function(e) {
    // IndexedDB 실패 시 localStorage 폴백 (짧게)
    console.warn('IndexedDB 저장 실패, localStorage 폴백:', e);
    try {
      var n = Math.max(slim.length, 1);
      var shortLen = Math.max(150, Math.floor((3.5*1024*1024)/n/3) - 30);
      var short = loaded.map(function(p){ return { id:p.id, title:p.title, depth:p.depth, hasChildren:p.hasChildren, content:(p.content||'').substring(0,shortLen), pageUrl:p.pageUrl||'', lastModified:p.lastModified||null }; });
      localStorage.setItem(CACHE_KEY, JSON.stringify({ space:space, base:base, savedAt:Date.now(), pages:pages, loaded:short }));
    } catch(e2) { console.error('캐시 저장 모두 실패'); }
  });
}

function loadCacheData(space, base) {
  // IndexedDB는 비동기라 동기 래퍼를 쓸 수 없음 → 호출부에서 Promise로 처리
  // 이 함수는 localStorage 폴백용으로만 남김
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    var d = JSON.parse(raw);
    if (!d || d.space !== space || d.base !== base) return null;
    if (Date.now() - d.savedAt > CACHE_TTL) return null;
    if (!d.loaded || !d.pages) return null;
    return d;
  } catch(e) { return null; }
}

function loadCacheDataAsync(space, base) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var req = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).get(CACHE_KEY);
      req.onsuccess = function() {
        var d = req.result;
        if (!d || d.space !== space || d.base !== base) { resolve(null); return; }
        if (Date.now() - d.savedAt > CACHE_TTL) { resolve(null); return; }
        if (!d.loaded || !d.pages) { resolve(null); return; }
        resolve(d);
      };
      req.onerror = function() { resolve(null); };
    });
  }).catch(function() {
    // IndexedDB 실패 시 localStorage 폴백
    return loadCacheData(space, base);
  });
}

function clearCache() {
  localStorage.removeItem(CACHE_KEY);
  openDB().then(function(db) {
    db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).delete(CACHE_KEY);
  }).catch(function(){});
}

/**
 * 백그라운드 변경 점검:
 * 마지막 캐시 저장 시각 이후 변경된 페이지를 Confluence에서 조회해서
 * - 기존 페이지가 수정됐으면 → pageStore 업데이트 + 사이드바 제목 갱신
 * - 새 페이지가 추가됐으면 → pageStore + 사이드바 트리에 추가
 * - 삭제된 페이지 감지는 Confluence API 한계로 불가하므로 스킵
 * 변동이 있으면 상태바에 알림 표시 후 캐시 재저장
 */
async function checkAndSyncChanges(savedAt) {
  if (!creds.email || !creds.token || !savedAt) return;
  try {
    var since = new Date(savedAt).toISOString();
    var r = await fetch(API + '/api/changed-pages', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, spaceKey: creds.space, since: since })
    });
    if (!r.ok) return;
    var d = await r.json();
    if (!d.success || !d.pages || d.pages.length === 0) {
      console.log('[동기화] 변경된 페이지 없음');
      return;
    }

    var changed = d.pages;
    console.log('[동기화] 변경된 페이지', changed.length + '개 감지:', changed.map(function(p){ return p.title; }));

    // 변경된 각 페이지의 내용을 개별적으로 가져와서 pageStore 업데이트
    var newPages = [];
    var updatedTitles = [];
    await Promise.all(changed.map(async function(p) {
      try {
        var cr = await fetch(API + '/api/page-content', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, pageId: p.id })
        });
        var cd = await cr.json();
        if (cd.success) {
          var existed = !!pageStore[p.id];
          pageStore[p.id] = {
            title: cd.title || p.title,
            content: cd.content || '',
            html: cd.html || '',
            pageUrl: cd.pageUrl || '',
            lastModified: p.lastModified || null
          };
          updatedTitles.push(cd.title || p.title);
          if (!existed) {
            newPages.push({ id: p.id, title: cd.title || p.title, depth: p.depth, hasChildren: p.hasChildren, content: cd.content || '', html: cd.html||'', pageUrl: cd.pageUrl||'', lastModified: p.lastModified||null });
          }
        }
      } catch(e) { /* 개별 페이지 fetch 실패는 무시하고 계속 */ }
    }));

    if (updatedTitles.length === 0) return;

    // 새 페이지가 있으면 allLoadedPages와 사이드바 트리에 반영
    if (newPages.length > 0) {
      newPages.forEach(function(np) {
        allLoadedPages.push({ id: np.id, title: np.title, depth: np.depth, hasChildren: np.hasChildren });
        if (pageTreeMap) {
          pageTreeMap[np.id] = { id: np.id, title: np.title, children: [], depth: np.depth };
        }
      });
      // 사이드바 재렌더링 (전체 트리 재구성은 복잡하므로 새 페이지는 페이지 목록 맨 아래에 추가)
      var pl = document.getElementById('page-list');
      if (pl) {
        newPages.forEach(function(np) {
          var pi = document.createElement('div');
          pi.className = 'pi';
          pi.style.paddingLeft = Math.min(np.depth * 12 + 6, 60) + 'px';
          pi.innerHTML = '<span class="pi-icon">📄</span><span class="pi-label">' + escHtml(np.title) + '</span>';
          pi.addEventListener('click', function(){ openModal(np.id); });
          pl.appendChild(pi);
        });
      }
    }

    // 캐시 재저장 (변경된 내용 반영)
    var currentLoaded = allLoadedPages.map(function(p) {
      var pg = pageStore[p.id];
      return { id: p.id, title: pg ? pg.title : p.title, depth: p.depth, hasChildren: p.hasChildren,
               content: pg ? (pg.content||'').substring(0, 6000) : '', pageUrl: pg ? (pg.pageUrl||'') : '',
               lastModified: pg ? (pg.lastModified||null) : null };
    });
    saveCache(creds.space, creds.base, allLoadedPages, currentLoaded);

    // 상태바에 변경 내용 알림
    var sbFoot = document.getElementById('sb-foot');
    if (sbFoot) {
      var msg = updatedTitles.length + '개 페이지 업데이트됨';
      if (newPages.length > 0) msg += ' (+' + newPages.length + '개 신규)';
      sbFoot.innerHTML = '<span style="color:var(--success);font-size:11px;">🔄 ' + msg + '</span>';
      setTimeout(function() {
        var n = Object.keys(pageStore).length;
        sbFoot.textContent = '총 ' + n + '개 페이지 · 방금 동기화됨';
      }, 5000);
    }

    console.log('[동기화] 완료:', updatedTitles);
  } catch(e) {
    console.warn('[동기화] 오류 (무시):', e);
  }
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cacheAge(savedAt) {
  var diff = Date.now() - savedAt;
  var h = Math.floor(diff / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? h + '시간 ' + m + '분 전 캐시' : m + '분 전 캐시';
}

// ── Connect ──
document.getElementById('conn-btn').addEventListener('click', connectConfluence);

async function connectConfluence() {
  var email = document.getElementById('f-email').value.trim();
  var token = document.getElementById('f-token').value.trim();
  var space = document.getElementById('f-space').value.trim();
  var base  = document.getElementById('f-base').value.trim().replace(/\/$/, '');

  if (!email || !token) { showErr('이메일과 API 토큰을 입력해주세요.'); return; }
  document.getElementById('err-box').style.display = 'none';
  creds = { email: email, token: token, base: base };
  localStorage.setItem(CREDS_KEY, JSON.stringify({ email: email, token: token, space: space, base: base }));

  var btn = document.getElementById('conn-btn');
  btn.disabled = true; btn.textContent = '연결 중...';

  // 캐시 확인 (IndexedDB 비동기)
  var cached = await loadCacheDataAsync(space, base);
  if (cached) {
    showOv('캐시 불러오는 중...', 90, '');
    try {
      cached.loaded.forEach(function(p) {
        pageStore[p.id] = { title: p.title, content: p.content || '', html: '', pageUrl: p.pageUrl || '', lastModified: p.lastModified || null };
      });
      showOv('완료!', 100, '');
      await sleep(200);
      hideOv();
      showMain(cached.pages, cached.loaded, cached.savedAt);
      // 백그라운드에서 변경 점검 (UI 블로킹 없이 조용히 실행)
      setTimeout(function(){ checkAndSyncChanges(cached.savedAt); }, 2000);
    } catch(e) {
      hideOv();
      clearCache();
      btn.disabled = false; btn.textContent = '🚀 기획서 불러오기';
      showErr('캐시 오류. 다시 불러옵니다.');
    }
    return;
  }

  // 신규 로딩
  showOv('페이지 목록 불러오는 중...', 10, 'Space: ' + space);
  try {
    // 페이지 목록을 partial 응답이 끝날 때까지 반복 호출
    var rawPages = [];
    var nextStart = 0;
    var loopGuard = 0;
    while (true) {
      loopGuard++;
      if (loopGuard > 50) throw new Error('페이지 목록이 너무 많아요.');
      showOv('페이지 목록 불러오는 중... (' + rawPages.length + '개 확인됨)', 10, 'Space: ' + space);
      var pRes = await fetch(API + '/api/pages', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: email, token: token, baseUrl: base, spaceKey: space, start: nextStart })
      });
      var pText = await pRes.text();
      var pData;
      try { pData = JSON.parse(pText); }
      catch(e) { throw new Error('서버 응답 오류: 페이지 목록을 불러오는 중 서버 시간 초과가 발생했어요. 잠시 후 다시 시도해주세요.'); }
      if (!pRes.ok) throw new Error(pData.error || '페이지 목록 조회 실패');
      rawPages = rawPages.concat(pData.pages || []);
      if (!pData.partial) break;
      nextStart = pData.nextStart;
    }
    if (!rawPages.length) throw new Error('페이지를 찾지 못했어요. Space Key를 확인해주세요.');

    // 트리 구조 구성 (클라이언트에서 처리)
    var pageMap = {};
    rawPages.forEach(function(p) {
      pageMap[p.id] = {
        id: p.id, title: p.title,
        parentId: (p.ancestors && p.ancestors.length > 0) ? p.ancestors[p.ancestors.length-1].id : null,
        children: [], depth: (p.ancestors ? p.ancestors.length : 0)
      };
    });
    Object.keys(pageMap).forEach(function(id) {
      var p = pageMap[id];
      if (p.parentId && pageMap[p.parentId]) pageMap[p.parentId].children.push(id);
    });
    var roots = Object.keys(pageMap).filter(function(id){ var p=pageMap[id]; return !p.parentId || !pageMap[p.parentId]; });
    var pages = [];
    function dfs(id) {
      var p = pageMap[id];
      if (!p) return;
      pages.push({ id: p.id, title: p.title, depth: p.depth, hasChildren: p.children.length > 0 });
      p.children.forEach(dfs);
    }
    roots.forEach(dfs);

    var total = pages.length;
    var loaded = [];

    for (var i = 0; i < total; i += 5) {
      var batch = pages.slice(i, Math.min(i + 5, total));
      var pct = 15 + Math.round((i / total) * 75);
      showOv('페이지 읽는 중 (' + (i+1) + '/' + total + ')', pct, batch[0] ? batch[0].title : '');

      var results = await Promise.allSettled(batch.map(function(pg) {
        return fetch(API + '/api/page-content', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: email, token: token, baseUrl: base, pageId: pg.id })
        }).then(function(r){ return r.json(); }).then(function(d){ return Object.assign({}, pg, d); });
      }));

      results.forEach(function(r) {
        if (r.status === 'fulfilled' && r.value.success && r.value.content && r.value.content.trim()) {
          var v = r.value;
          pageStore[v.id] = { title: v.title, content: v.content, html: v.html || '', pageUrl: v.pageUrl || '', lastModified: v.lastModified || null };
          loaded.push({ id: v.id, title: v.title, depth: v.depth, hasChildren: v.hasChildren, content: v.content, html: v.html||'', pageUrl: v.pageUrl||'', lastModified: v.lastModified||null });
        }
      });
    }

    showOv('캐시 저장 중...', 97, '다음 접속부터 즉시 로드됩니다!');
    saveCache(space, base, pages, loaded);
    showOv('완료!', 100, '');
    await sleep(300);
    hideOv();
    showMain(pages, loaded, null);
  } catch(e) {
    hideOv();
    btn.disabled = false; btn.textContent = '🚀 기획서 불러오기';
    showErr('오류: ' + e.message);
  }
}

function showErr(msg) {
  var el = document.getElementById('err-box');
  el.textContent = msg; el.style.display = 'block';
}

// ── Main 화면 ──
function showMain(allPages, loaded, savedAt) {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('dot').className = 'dot on';
  document.getElementById('st-text').textContent = loaded.length + '개 페이지 로드됨';
  allLoadedPages = loaded;
  setTimeout(buildSearchIndex, 100);

  // 트리 구성
  var map = {};
  allPages.forEach(function(p){ map[p.id] = Object.assign({}, p, {children:[]}); });
  var roots = [], stack = [];
  allPages.forEach(function(p) {
    var node = map[p.id];
    while (stack.length > 0 && stack[stack.length-1].depth >= p.depth) stack.pop();
    if (stack.length === 0) roots.push(node);
    else stack[stack.length-1].children.push(node);
    stack.push(node);
  });
  pageTreeMap = map; // 모달에서 "실제 하위 페이지" 표시에 사용

  var loadedIds = new Set(loaded.map(function(p){ return p.id; }));
  var list = document.getElementById('page-list');
  list.innerHTML = '';

  function renderNode(node, container) {
    var hasLoaded = loadedIds.has(node.id);
    var hasChildren = node.children.length > 0;
    var wrapper = document.createElement('div');
    var row = document.createElement('div');
    row.className = 'pi';
    if (!hasLoaded) row.style.opacity = '0.45';
    var indent = document.createElement('div');
    indent.style.cssText = 'width:' + (node.depth*12) + 'px;flex-shrink:0;';
    var toggle = document.createElement('div');
    toggle.className = 'pi-toggle';
    if (hasChildren) toggle.textContent = '▶';
    var icon = document.createElement('span');
    icon.className = 'pi-icon';
    icon.textContent = hasChildren ? '📁' : '📄';
    var label = document.createElement('span');
    label.className = 'pi-label';
    label.textContent = node.title;
    row.appendChild(indent); row.appendChild(toggle); row.appendChild(icon); row.appendChild(label);
    wrapper.appendChild(row);

    if (hasChildren) {
      var cc = document.createElement('div');
      cc.className = 'pi-children';
      node.children.forEach(function(child){ renderNode(child, cc); });
      wrapper.appendChild(cc);
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var isOpen = cc.classList.contains('open');
        cc.classList.toggle('open', !isOpen);
        toggle.classList.toggle('open', !isOpen);
        icon.textContent = !isOpen ? '📂' : '📁';
      });
      row.addEventListener('click', function(e) {
        if (e.target === toggle) return;
        cc.classList.add('open'); toggle.classList.add('open'); icon.textContent = '📂';
        if (hasLoaded) openModal(node.id);
      });
    } else {
      row.addEventListener('click', function(){ if (hasLoaded) openModal(node.id); });
    }
    container.appendChild(wrapper);
  }
  roots.forEach(function(r){ renderNode(r, list); });

  var foot = document.getElementById('sb-foot');
  var ageStr = savedAt ? ' · ' + cacheAge(savedAt) : ' · 방금 로드됨';
  foot.innerHTML = '총 ' + loaded.length + '개 페이지' + ageStr + ' <span id="refresh-btn" style="cursor:pointer;color:var(--accent);margin-left:4px;">↺ 새로고침</span>';
  document.getElementById('refresh-btn').addEventListener('click', function() {
    if (confirm('캐시를 삭제하고 다시 불러올까요?')) { clearCache(); location.reload(); }
  });
  addChips();
}

function addChips() {
  var chips = document.getElementById('chips');
  if (!chips) return;
  chips.innerHTML = '';
  ['이 문서의 OO 시스템에 대해 설명해줘','OO 관련 페이지를 모두 찾아줘','OO 수치 기준을 알려줘'].forEach(function(s) {
    var c = document.createElement('div');
    c.className = 'chip-hint'; c.textContent = 'ex) ' + s;
    chips.appendChild(c);
  });
}

// ── 페이지 모달 ──
async function openModal(id) {
  var pg = pageStore[id];

  // pageStore에 아직 없는 페이지(트리에 없거나 다른 페이지 본문 링크로만 존재하는 경우)는
  // 새 창을 여는 대신, 바로 Confluence에서 가져와서 모달로 보여준다.
  if (!pg) {
    if (!creds.email || !creds.token) return; // 자격증명 없으면 시도 자체가 불가능
    document.getElementById('modal-title').textContent = '불러오는 중...';
    var body0 = document.getElementById('modal-body');
    body0.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">불러오는 중...</div>';
    document.getElementById('page-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    try {
      var r0 = await fetch(API + '/api/page-content', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, pageId: id })
      });
      var d0 = await r0.json();
      if (d0.success) {
        pg = { title: d0.title || '제목 없음', content: d0.content || '', html: d0.html || '', pageUrl: d0.pageUrl || '' };
        pageStore[id] = pg; // 다음에 또 클릭하면 즉시 열리도록 캐시에 등록
      } else {
        body0.innerHTML = '<div style="padding:40px;text-align:center;color:var(--error)">페이지를 불러올 수 없어요.<br>' + (d0.error || '') + '</div>';
        return;
      }
    } catch(e) {
      body0.innerHTML = '<div style="padding:40px;text-align:center;color:var(--error)">페이지를 불러오는 중 오류가 발생했어요.</div>';
      return;
    }
  } else {
    if (window.innerWidth <= 768) closeMobileSidebar();
    document.getElementById('page-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  document.querySelectorAll('.pi').forEach(function(x){ x.classList.remove('active'); });
  document.querySelectorAll('.pi-label').forEach(function(el){
    if (el.textContent === pg.title) el.closest('.pi').classList.add('active');
  });

  document.getElementById('modal-title').textContent = pg.title;
  // 바로가기 버튼 URL 업데이트 (pg.pageUrl이 없으면 직접 계산)
  var gotoUrl = pg.pageUrl || (creds.base + '/wiki/spaces/' + creds.space + '/pages/' + id);
  document.getElementById('modal-goto-btn').href = gotoUrl;
  var body = document.getElementById('modal-body');
  body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">불러오는 중...</div>';

  // html이 캐시에 없을 때만 fetch (토큰 절약 - 로딩 시 받은 html 재사용)
  if (!pg.html && creds.email && creds.token) {
    try {
      var r = await fetch(API + '/api/page-content', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, pageId: id })
      });
      var d = await r.json();
      if (d.success) { pg.html = d.html || ''; if (d.content) pg.content = d.content; if (d.pageUrl) pg.pageUrl = d.pageUrl; }
    } catch(e) { console.warn('fetch 실패:', e); }
  }

  if (pg.html) {
    var html = pg.html;

    // ── Confluence 매크로/UI 정제 ──
    // 1) 파일 업로드 폼, 레이블 편집, 인터랙티브 매크로 UI 제거
    var parser = new DOMParser();
    var doc = parser.parseFromString('<div id="root">' + html + '</div>', 'text/html');
    var root = doc.getElementById('root');




    // Confluence UI 완전 제거 - 기획 내용이 아닌 모든 UI 요소
    var removeSelectors = [
      'form', 'input[type="file"]', 'iframe',
      '.label-editor', '[class*="label-editor"]',
      '[class*="upload"]', '[class*="drag-drop"]', '[data-testid*="upload"]',
      '[class*="view-file"]', '[class*="spreadsheet"]', '[class*="sheet-wrap"]',
      '[class*="file-wrap"]', '[class*="office-viewer"]', '[class*="viewfile"]',
      '[data-macro-name="view-file"]', '[data-macro-name="viewfile"]',
      '[class*="attachment"]', '[class*="attachments"]',
      '[data-macro-name="attachments"]',
      '.confluence-information-macro-note'
    ].join(', ');
    root.querySelectorAll(removeSelectors).forEach(function(el){ el.remove(); });

    // 레이블/Preview/모두 다운로드 행 제거
    root.querySelectorAll('td').forEach(function(td) {
      var text = td.textContent.trim();
      if (/^레이블/.test(text) || /^Preview/.test(text) || /^모두\s*다운로드/.test(text)) {
        var tr = td.closest('tr');
        if (tr) tr.remove();
      }
    });
    // 내용 없어진 테이블 + "파일/변경됨" 첨부파일 매크로 테이블 제거
    var pageOrigUrl = (pg && pg.pageUrl) ? pg.pageUrl : (creds.base + '/wiki/spaces/' + creds.space + '/pages/' + id);
    root.querySelectorAll('table').forEach(function(tbl) {
      var text = tbl.textContent.trim();
      if (!text) { tbl.remove(); return; }
      var ths = Array.from(tbl.querySelectorAll('th, td'));
      var thTexts = ths.map(function(el){ return el.textContent.trim(); }).filter(Boolean);
      if (thTexts.every(function(t){ return ['파일','변경됨',''].includes(t); })) {
        var notice = doc.createElement('p');
        notice.innerHTML = '📎 첨부파일이 있어요. 미리보기·다운로드는 <a href="' + pageOrigUrl + '" target="_blank">Confluence 원본 페이지</a>에서 가능해요.';
        tbl.parentNode.insertBefore(notice, tbl);
        tbl.remove();
      }
    });

    // "끌어다 놓기로 업로드" 텍스트 포함된 요소 제거
    root.querySelectorAll('p, div, li').forEach(function(el) {
      var t = el.textContent.trim();
      if (t.includes('끌어다 놓기로 업로드') || t.includes('파일 찾아보기') || t === '끌어다 놓기로 업로드하거나') {
        el.remove();
      }
    });

    // 로딩 스피너 제거
    root.querySelectorAll('[class*="spinner"], [class*="loading"], [class*="aui-icon-wait"]').forEach(function(el){ el.remove(); });

    // 변경 이력 섹션 제거
    root.querySelectorAll(
      '[class*="page-metadata"], [class*="recently-updated"], [class*="modification"]'
    ).forEach(function(el){ el.remove(); });

    // 2) 이미지 src를 프록시 URL로 교체 (Confluence 첨부 이미지는 인증 필요)
    root.querySelectorAll('img').forEach(function(img) {
      var src = img.getAttribute('src') || '';
      if (!src) return;
      // 절대경로로 변환
      if (src.startsWith('/')) src = creds.base + src;
      // Confluence 내부 이미지이면 프록시로 교체
      if (src.includes(creds.base) || src.includes('/wiki/') || src.includes('/download/')) {
        img.setAttribute('src',
          API + '/api/attachment?url=' + encodeURIComponent(src) +
          '&email=' + encodeURIComponent(creds.email) +
          '&token=' + encodeURIComponent(creds.token)
        );
      }
    });

    // 3) 첨부파일 링크 처리
    root.querySelectorAll('a[href*="/download/attachments/"], a[href*="/wiki/download/"]').forEach(function(a) {
      var href = a.getAttribute('href') || '';
      if (href.startsWith('/')) href = creds.base + href;
      var hrefFilename = decodeURIComponent(href.split('/').pop().split('?')[0]);
      var filename = hrefFilename || a.textContent.trim() || '첨부파일';
      var ext = filename.split('.').pop().toLowerCase();
      var proxyUrl = API + '/api/attachment?url=' + encodeURIComponent(href) + '&email=' + encodeURIComponent(creds.email) + '&token=' + encodeURIComponent(creds.token);

      if (['png','jpg','jpeg','gif','webp','svg'].includes(ext)) {
        // 이미지: 프록시로 인라인 표시
        var previewImg = doc.createElement('img');
        previewImg.setAttribute('src', proxyUrl);
        previewImg.style.cssText = 'max-width:100%;border-radius:6px;margin:8px 0;cursor:zoom-in;display:block;';
        previewImg.title = filename;
        previewImg.onerror = function() {
          this.style.display = 'none';
          var msg = doc.createElement('div');
          msg.style.cssText = 'color:var(--text-muted);font-size:12px;padding:4px 0;';
          msg.textContent = '🖼️ 이미지를 불러올 수 없어요: ' + filename;
          this.parentNode && this.parentNode.insertBefore(msg, this);
        };
        a.parentNode && a.parentNode.replaceChild(previewImg, a);
      } else {
        // 엑셀·PDF·기타 파일: 다운로드/미리보기는 Confluence 원본 페이지에서 가능하다고 안내
        var icon = ['xlsx','xls'].includes(ext) ? '📊' : ext === 'pdf' ? '📄' : ext === 'pptx' || ext === 'ppt' ? '📑' : ext === 'docx' || ext === 'doc' ? '📝' : '📎';
        var notice = doc.createElement('span');
        notice.style.cssText = 'display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);padding:2px 0;';
        notice.innerHTML = icon + ' <b style="color:var(--text);font-size:13px;">' + escHtml(filename) + '</b> — 미리보기·다운로드는 <a href="' + escHtml(pg.pageUrl || creds.base) + '" target="_blank" style="color:var(--accent);text-decoration:underline;">Confluence 원본 페이지</a>에서 가능해요.';
        a.parentNode && a.parentNode.replaceChild(notice, a);
      }
    });

    // ── HTML 정제 (서버에서 li>p 언래핑 등 주요 처리 완료, 클라이언트는 보완만) ──

    // 혹시 남은 인라인 style 제거
    root.querySelectorAll('[style]').forEach(function(el) {
      el.removeAttribute('style');
    });

    // li 안의 p 언래핑 (서버에서 못 잡은 경우 이중 처리)
    root.querySelectorAll('li > p').forEach(function(p) {
      while (p.firstChild) p.parentNode.insertBefore(p.firstChild, p);
      p.remove();
    });

    // ul/ol 안의 li 사이 br 및 빈 텍스트 노드 제거
    root.querySelectorAll('ul, ol').forEach(function(list) {
      Array.from(list.childNodes).forEach(function(node) {
        if (node.nodeType === 3 && !node.textContent.trim()) { node.parentNode.removeChild(node); return; }
        if (node.nodeType === 1 && node.tagName === 'BR') { node.parentNode.removeChild(node); return; }
      });
    });

    // 빈 p/li 제거
    root.querySelectorAll('p, li').forEach(function(el) {
      var inner = el.innerHTML.replace(/<br\s*\/?>/gi,'').replace(/&nbsp;/gi,'').trim();
      if (!inner) el.remove();
    });

    // 블록 사이 단독 br 제거
    root.querySelectorAll('br').forEach(function(br) {
      var prev = br.previousSibling, next = br.nextSibling;
      function isBlock(n){ return n && n.nodeType===1 && /^(UL|OL|LI|P|DIV|H[1-6]|TABLE)$/.test(n.tagName); }
      if (isBlock(prev) || isBlock(next)) br.remove();
    });

    // MSO CSS 텍스트 노출 제거
    root.querySelectorAll('p, div, td').forEach(function(el) {
      if (/mso-[\w-]+:|\.style\d+\s*\{/.test(el.textContent||'') && (el.textContent||'').length > 100) el.remove();
    });

    html = root.innerHTML;
    body.innerHTML = html;
    body.scrollTop = 0;

    // 렌더링 후 실질적인 내용이 없으면 안내 메시지 표시
    // pageUrl: fetch 결과 > pageStore 값 > 직접 계산 순으로 사용
    var pageOrigUrl = pg.pageUrl || (creds.base + '/wiki/spaces/' + creds.space + '/pages/' + id);
    var bodyText = body.innerText ? body.innerText.trim() : body.textContent.trim();
    if (!bodyText || bodyText.length < 10) {
      body.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:14px;">📎 이 페이지에는 첨부파일이 포함되어 있어요.<br><br>미리보기·다운로드는 <a href="' + pageOrigUrl + '" target="_blank" data-external="true" style="color:var(--accent);">Confluence 원본 페이지</a>에서 가능해요.</div>';
    }

    // creds.base의 호스트명을 추출해서, "같은 Confluence 사이트로 가는 링크인지" 판별
    var baseHost = '';
    try { baseHost = new URL(creds.base).hostname; } catch(e) {}

    body.querySelectorAll('a').forEach(function(a) {
      var href = a.getAttribute('href') || '';
      if (!href || href.startsWith('#')) return;
      if (a.getAttribute('data-external')) return; // 외부 링크로 명시된 건 건드리지 않음

      var hrefHost = '';
      try { hrefHost = new URL(href, creds.base).hostname; } catch(e) {}

      // Confluence 내부 페이지로 추정되는 모든 패턴을 폭넓게 인식:
      // - /wiki/, /pages/ 가 포함된 표준 URL
      // - /confluence/x/XXXX 같은 Tiny Link(단축 URL) 형식
      // - baseHost(연결한 Confluence 도메인)와 같은 호스트의 링크 전부
      // - 상대경로(/로 시작, 외부 절대 URL이 아닌 경우)
      var looksLikeConfluence =
        href.includes('/wiki/') || href.includes('/pages/') ||
        /\/confluence\/x\/[A-Za-z0-9]+/.test(href) ||
        (baseHost && hrefHost === baseHost) ||
        (href.startsWith('/') && !href.startsWith('//'));

      if (looksLikeConfluence) {
        a.href = '#';
        a.addEventListener('click', function(e) {
          e.preventDefault();
          var pidMatch = href.match(/\/pages\/(\d+)/);
          var t = a.textContent.trim();
          if (pidMatch) {
            // 페이지 ID를 URL에서 바로 알 수 있는 표준 링크
            openModal(pidMatch[1]);
          } else {
            // Tiny Link 등 ID를 알 수 없는 링크는 텍스트(제목)로 먼저 매칭
            var found = t ? findPageByTitle(t) : null;
            if (found) {
              openModal(found.id);
            } else {
              var anyIdMatch = href.match(/(\d{4,})/);
              if (anyIdMatch) {
                openModal(anyIdMatch[1]);
              } else if (t) {
                // pageStore에 없으면 Confluence에 직접 제목 검색을 요청해서 찾아옴
                openModalBySearch(t);
              } else {
                alert('연결된 페이지를 찾을 수 없어요.\n좌측 사이드바 검색으로 찾아보세요.');
              }
            }
          }
        });
      } else if (href && !href.startsWith('#')) {
        // 진짜 외부 사이트(다른 도메인)일 때만 새 창으로 열기
        a.target = '_blank'; a.rel = 'noopener';
      }
    });
    body.querySelectorAll('img').forEach(function(img) {
      img.loading = 'lazy';
      img.onerror = function(){ img.style.display='none'; };
      img.addEventListener('click', function(e){ e.stopPropagation(); openImgViewer(img.src); });
    });
  } else {
    body.innerHTML = '<p style="white-space:pre-wrap;color:var(--text-muted)">' + (pg.content || '내용 없음') + '</p>';
  }

  // 본문에 적힌 링크 목록과 별개로, 실제 Confluence 트리 구조상의 하위 페이지를 추가로 보여줌
  // (작성자가 본문에 일부 하위 페이지만 링크로 정리해둔 경우, 누락 없이 전체 구조를 확인할 수 있도록)
  var treeNode = pageTreeMap[id];
  if (treeNode && treeNode.children && treeNode.children.length > 0) {
    var sub = document.createElement('div');
    sub.style.cssText = 'margin-top:20px;padding-top:16px;border-top:1px solid var(--border);';
    var subTitle = document.createElement('div');
    subTitle.style.cssText = 'font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px;';
    subTitle.textContent = '📂 하위 페이지 전체 (' + treeNode.children.length + '개)';
    sub.appendChild(subTitle);
    var subList = document.createElement('div');
    subList.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
    treeNode.children.forEach(function(childNode) {
      if (!childNode) return;
      var chip = document.createElement('span');
      chip.className = 'page-ref';
      chip.textContent = '📄 ' + childNode.title;
      chip.style.cursor = 'pointer';
      chip.addEventListener('click', function(){ openModal(childNode.id); });
      subList.appendChild(chip);
    });
    sub.appendChild(subList);
    body.appendChild(sub);
  }

  document.getElementById('modal-ask-btn').onclick = function() {
    closeModal();
    document.getElementById('q-input').value = '"' + pg.title + '" 페이지의 핵심 내용을 항목별로 구체적으로 정리해줘';
    var welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    sendMsg();
  };
}

function closeModal() {
  document.getElementById('page-modal').classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('.pi').forEach(function(x){ x.classList.remove('active'); });
}

function findPageByTitle(title) {
  var keys = Object.keys(pageStore);
  for (var i = 0; i < keys.length; i++) { if (pageStore[keys[i]].title === title) return { id: keys[i], pg: pageStore[keys[i]] }; }
  var tl = title.toLowerCase();
  for (var i = 0; i < keys.length; i++) { if (pageStore[keys[i]].title.toLowerCase().includes(tl)) return { id: keys[i], pg: pageStore[keys[i]] }; }
  return null;
}

function openModalByTitle(title) {
  var r = findPageByTitle(title);
  if (r) openModal(r.id);
}

/**
 * pageStore에서 제목 매칭이 실패했을 때 쓰는 최종 폴백.
 * Confluence에 CQL로 제목 검색을 요청해서, 찾으면 바로 모달로 표시하고
 * pageStore에도 등록해서 다음부터는 즉시 열리도록 한다.
 */
async function openModalBySearch(title) {
  if (!creds.email || !creds.token || !title) return false;
  document.getElementById('modal-title').textContent = '"' + title + '" 검색 중...';
  var body = document.getElementById('modal-body');
  body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">기획서에서 "' + title + '"를 찾는 중...</div>';
  document.getElementById('page-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    var r = await fetch(API + '/api/find-page', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, spaceKey: creds.space, title: title })
    });
    var d = await r.json();
    if (d.success && d.id) {
      pageStore[d.id] = { title: d.title, content: d.content || '', html: d.html || '', pageUrl: d.pageUrl || '' };
      openModal(d.id); // 새로 등록된 페이지로 모달 다시 채움
      return true;
    } else {
      body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">"' + title + '" 페이지를 찾지 못했어요.<br>좌측 사이드바 검색으로 찾아보세요.</div>';
      return false;
    }
  } catch(e) {
    body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--error)">검색 중 오류가 발생했어요.</div>';
    return false;
  }
}

document.getElementById('page-modal').addEventListener('click', function(e){ if (e.target === this) closeModal(); });
document.getElementById('modal-close-btn').addEventListener('click', closeModal);

function closeImgViewer() { document.getElementById('img-viewer').classList.remove('open'); }
document.getElementById('img-viewer').addEventListener('click', closeImgViewer);

document.addEventListener('keydown', function(e){ if (e.key==='Escape'){ closeModal(); closeImgViewer(); } });

// ── 검색 ──
function buildSearchIndex() {
  searchIndex = allLoadedPages.map(function(p) {
    var pg = pageStore[p.id];
    if (!pg) return null;
    return { id: p.id, title: pg.title, titleL: pg.title.toLowerCase(),
             contentL: (pg.content||'').substring(0,3000).toLowerCase(),
             content: (pg.content||'').substring(0,3000) };
  }).filter(Boolean);
}

document.getElementById('sb-search-input').addEventListener('input', function() {
  var val = this.value;
  document.getElementById('sb-search-clear').classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ searchPages(val); }, 300);
});

document.getElementById('sb-search-clear').addEventListener('click', function() {
  document.getElementById('sb-search-input').value = '';
  this.classList.remove('visible');
  searchPages('');
  document.getElementById('sb-search-input').focus();
});

function searchPages(query) {
  var pageList = document.getElementById('page-list');
  var searchResults = document.getElementById('search-results');
  var srList = document.getElementById('sr-list');
  var srCount = document.getElementById('sr-count');
  if (!query || query.trim().length < 1) {
    pageList.style.display = ''; searchResults.classList.remove('active'); return;
  }
  pageList.style.display = 'none'; searchResults.classList.add('active');
  var q = query.toLowerCase();
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  var results = [];
  for (var i = 0; i < searchIndex.length; i++) {
    var idx = searchIndex[i];
    var tm = idx.titleL.includes(q);
    var ci = idx.contentL.indexOf(q);
    if (tm || ci >= 0) { results.push({id:idx.id,title:idx.title,content:idx.content,titleMatch:tm,contentIdx:ci}); }
    if (results.length >= 200) break;
  }
  results.sort(function(a,b){ return (b.titleMatch?1:0)-(a.titleMatch?1:0); });
  srCount.textContent = results.length > 0 ? '검색 결과 ' + results.length + '개' : '';
  var frag = document.createDocumentFragment();
  if (results.length === 0) {
    var empty = document.createElement('div'); empty.className='sr-empty'; empty.textContent='검색 결과가 없어요'; frag.appendChild(empty);
  } else {
    results.slice(0, 50).forEach(function(r) {
      var item = document.createElement('div'); item.className='sr-item';
      var titleEl = document.createElement('div'); titleEl.className='sr-title';
      titleEl.innerHTML = r.title.replace(re, '<mark>$1</mark>');
      item.appendChild(titleEl);
      if (r.contentIdx >= 0) {
        var start = Math.max(0, r.contentIdx-40); var end = Math.min(r.content.length, r.contentIdx+120);
        var raw = (start>0?'...':'')+r.content.slice(start,end)+(end<r.content.length?'...':'');
        var snippet = document.createElement('div'); snippet.className='sr-snippet';
        snippet.innerHTML = raw.replace(re,'<mark>$1</mark>'); item.appendChild(snippet);
      }
      (function(id){ item.addEventListener('click', function(){ openModal(id); }); })(r.id);
      frag.appendChild(item);
    });
  }
  srList.innerHTML = ''; srList.appendChild(frag);
}

document.getElementById('send-btn').addEventListener('click', handleSendBtn);
document.getElementById('q-input').addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
document.getElementById('q-input').addEventListener('input', function(){ resizeTA(this); });

function handleSendBtn(){ if(busy) stopAnswer(); else sendMsg(); }
function stopAnswer(){ if(abortCtrl) abortCtrl.abort(); }
function setSendBtn(isStop){
  var btn = document.getElementById('send-btn');
  btn.textContent = isStop ? '■' : '↑';
  btn.className = isStop ? 'send-btn stop' : 'send-btn';
}

async function sendMsg() {
  var input = document.getElementById('q-input');
  var msg = input.value.trim();
  if (!msg || busy) return;
  busy = true; input.value = ''; resizeTA(input);
  var welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  addMsg('user', msg, false);
  var typEl = addTyping();
  setSendBtn(true);
  document.getElementById('dot').className = 'dot spin';
  document.getElementById('st-text').textContent = 'AI 생각 중...';
  abortCtrl = new AbortController();

  // ── 최근 변경/작성 질문 감지: 캐시 대신 Confluence에서 실시간으로 최신 페이지 조회 ──
  var RECENT_KEYWORDS = ['최근에 변경', '최근에 작성', '가장 최근', '최근 변경', '최근 작성', '최신 기획', '최신 변경', '최신 작성', '최근 수정', '최신 수정', '오늘 변경', '오늘 수정', '오늘 작성'];
  var isRecentQuery = RECENT_KEYWORDS.some(function(kw){ return msg.includes(kw); });

  if (isRecentQuery && creds.email && creds.token) {
    document.getElementById('st-text').textContent = '최근 수정된 기획서 실시간 조회 중...';
    try {
      var rr = await fetch(API + '/api/recent-pages', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: creds.email, token: creds.token, baseUrl: creds.base, spaceKey: creds.space, limit: 10 })
      });
      var rawRR = await rr.text();
      var rd;
      try { rd = JSON.parse(rawRR); } catch(e) { rd = null; }
      if (rd && rd.success && rd.pages && rd.pages.length > 0) {
        // 실시간 조회 결과를 컨텍스트로 구성
        var now = new Date();
        var todayStr = now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일';
        var recentCtx = '[오늘 날짜: ' + todayStr + ']\n[아래는 Confluence에서 방금 실시간으로 조회한 최근 수정 페이지 목록입니다. 실제 수정일 기준으로 정렬되어 있습니다.]\n\n';
        rd.pages.forEach(function(p, i) {
          var modDate = p.lastModified ? new Date(p.lastModified).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'}) : '알 수 없음';
          recentCtx += '=== [' + p.title + '] (실제수정일:' + modDate + ') ===\n' + (p.content || '') + '\n\n';
        });

        document.getElementById('st-text').textContent = 'AI 생각 중...';
        try {
          var rRes = await fetch(API + '/api/ask', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            signal: abortCtrl.signal,
            body: JSON.stringify({ question: msg, context: recentCtx })
          });
          var rRaw = await rRes.text();
          var rData;
          try { rData = JSON.parse(rRaw); } catch(e) {
            throw new Error('서버 응답 오류 (HTTP ' + rRes.status + ')\n\n원본 응답:\n' + rRaw.substring(0, 300));
          }
          if (!rRes.ok) throw new Error((rData.error || '서버 오류') + ' (HTTP ' + rRes.status + ')');
          typEl.remove();
          console.log('[AI 원본답변]', rData.answer);
          addMsg('ai', rData.answer, true);
        } catch(e) {
          typEl.remove();
          if (e.name === 'AbortError') addMsg('ai', '⏹ 답변이 중단되었습니다.', false);
          else addMsg('ai', '❌ 오류: ' + e.message, false);
        }
        busy = false; abortCtrl = null; setSendBtn(false);
        document.getElementById('dot').className = 'dot on';
        document.getElementById('st-text').textContent = '기획서 로드됨';
        return; // 일반 sendMsg 흐름을 타지 않고 여기서 종료
      }
    } catch(recentErr) {
      console.warn('최근 페이지 조회 실패, 일반 흐름으로 계속:', recentErr);
    }
  }
  // ── 이하 일반 질문 처리 흐름 ──
  // IndexedDB 캐시에 페이지당 6000자가 저장되어 있으므로 실시간 보강 fetch 불필요
  document.getElementById('st-text').textContent = 'AI 생각 중...';

  // 질문에 맞는 관련 페이지만 골라 안전한 크기의 컨텍스트 생성
  var built = buildSafeContext(msg);

  try {
    var res = await fetch(API + '/api/ask', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      signal: abortCtrl.signal,
      body: JSON.stringify({ question: msg, context: built.text })
    });
    var rawText = await res.text();
    var data;
    try { data = JSON.parse(rawText); }
    catch(parseErr) {
      console.error('[디버그] JSON 파싱 실패, 원본 응답:', rawText);
      // 진단을 위해 서버가 실제로 보낸 응답(상태 코드 + 내용 일부)을 화면에 직접 표시
      var preview = (rawText || '(빈 응답)').substring(0, 500);
      throw new Error('서버 응답 오류 (HTTP ' + res.status + ')\n\n원본 응답:\n' + preview);
    }
    if (!res.ok) throw new Error((data.error || '서버 오류') + ' (HTTP ' + res.status + ')');
    console.log('[디버그] 매칭된 페이지:', data.matchedPages, '/ 모델:', data.model);
    typEl.remove();
    console.log('[AI 원본답변]', data.answer);
    addMsg('ai', data.answer, true);
  } catch(e) {
    typEl.remove();
    if (e.name === 'AbortError') addMsg('ai', '⏹ 답변이 중단되었습니다.', false);
    else addMsg('ai', '❌ 오류: ' + e.message, false);
  }
  busy = false; abortCtrl = null; setSendBtn(false);
  document.getElementById('dot').className = 'dot on';
  document.getElementById('st-text').textContent = '기획서 로드됨';
}

function addMsg(role, text, markdown) {
  var msgs = document.getElementById('msgs');
  var div = document.createElement('div'); div.className = 'msg ' + role;
  var av = document.createElement('div'); av.className = 'avatar';
  if (role==='ai') av.innerHTML = AI_AVATAR_SVG; else av.textContent = '👤';
  var bub = document.createElement('div'); bub.className = 'bubble';
  if (role==='ai'&&markdown) bub.innerHTML = mdToHtml(text);
  else bub.textContent = text;
  div.appendChild(av); div.appendChild(bub);
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  var msgs = document.getElementById('msgs');
  var div = document.createElement('div'); div.className = 'msg ai';
  div.innerHTML = '<div class="avatar">' + AI_AVATAR_SVG + '</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function mdToHtml(t) {
  t = t.replace(/\[\[(?![^\]]*\]\])[^\n]*/g, '');
  var usedPages = {};
  t = t.replace(/\[\[(.+?)\]\]/g, function(_, pn) {
    var key = pn.trim().toLowerCase();
    if (usedPages[key]) return '';
    usedPages[key] = true;
    var r = findPageByTitle(pn.trim());
    if (r) return '<a class="page-ref" href="#" onclick="event.preventDefault();openModal(\'' + r.id + '\')">📄 '+pn+'</a>';
    return '<span class="page-ref-na">📄 '+pn+'</span>';
  });
  t = t.replace(/^#### (.*)$/gm,'<h4>$1</h4>');
  t = t.replace(/^### (.*)$/gm,'<h3>$1</h3>');
  t = t.replace(/^## (.*)$/gm,'<h3>$1</h3>');
  t = t.replace(/^#{1,4}\s*$/gm, '');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  // - 항목 사이 빈 줄 완전 제거 (공백 포함)
  for (var _i = 0; _i < 8; _i++) {
    t = t.replace(/(^[ \t]*-[ \t].+)\n[ \t]*\n+([ \t]*-[ \t])/gm, '$1\n$2');
  }
  t = t.replace(/(^#{1,4}[^\n]+)\n[ \t]*\n+([ \t]*-[ \t])/gm, '$1\n$2');
  t = t.replace(/^ {2,}- (.+)$/gm,'<li class="li-sub">$1</li>');
  t = t.replace(/^- (.+)$/gm,'<li class="li-main">$1</li>');
  t = t.replace(/(<\/li>)[ \t]*\n[ \t\n]*(?=<li)/g, '$1\n');
  t = t.replace(/(<li[^>]*>[\s\S]*?<\/li>\n?)+/g, function(m){ return '<ul>'+m+'</ul>'; });
  // ul 사이의 모든 내용 제거
  t = t.replace(/<\/ul>[\s\S]*?<ul>/g, '</ul><ul>');
  // 나머지: 줄 단위로 p 변환
  var lines = t.split('\n');
  var out = [];
  for (var j = 0; j < lines.length; j++) {
    var line = lines[j].trim();
    if (!line) continue;
    if (line.startsWith('<')) { out.push(line); continue; }
    line = line.replace(/^#{1,4}\s*/, '');
    if (line) out.push('<p>'+line+'</p>');
  }
  return out.join('');
}
function resizeTA(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ── 초기화 ──
(function init() {
  // 테마
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t==='dark'?'☀️':'🌙';

  // 자격증명 복원
  try {
    var c = JSON.parse(localStorage.getItem(CREDS_KEY)||'{}');
    if (c.email) document.getElementById('f-email').value = c.email;
    if (c.token) document.getElementById('f-token').value = c.token;
    if (c.space) document.getElementById('f-space').value = c.space;
    if (c.base)  document.getElementById('f-base').value  = c.base;

    // 캐시 자동 로드 (IndexedDB 비동기)
    if (c.space && c.base) {
      var base = (c.base||'').replace(/\/$/,'');
      creds = { email: c.email||'', token: c.token||'', base: base, space: c.space };
      loadCacheDataAsync(c.space, base).then(function(cached) {
        if (!cached) return;
        showOv('캐시 불러오는 중...', 90, '');
        try {
          cached.loaded.forEach(function(p) {
            pageStore[p.id] = { title: p.title, content: p.content||'', html: '', pageUrl: p.pageUrl||'', lastModified: p.lastModified||null };
          });
          hideOv();
          showMain(cached.pages, cached.loaded, cached.savedAt);
          setTimeout(function(){ checkAndSyncChanges(cached.savedAt); }, 2000);
        } catch(e) {
          hideOv();
          clearCache();
        }
      });
    }
  } catch(e) {
    hideOv();
    clearCache();
  }
})();
</script>
